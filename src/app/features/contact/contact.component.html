<section class="contact-section">
  <div class="contact-card">
    <div class="contact-header">
      <h2>{{ t().CONTACT.TITLE_1 }} <span class="highlight">{{ t().CONTACT.TITLE_2 }}</span></h2>
      <p>{{ t().CONTACT.SUBTITLE }}</p>
    </div>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
      
      <div class="form-group">
        <label for="name">{{ t().CONTACT.NAME_LABEL }}</label>
        <input type="text" id="name" formControlName="name" [placeholder]="t().CONTACT.NAME_PLACEHOLDER" 
               [class.is-invalid]="isFieldInvalid('name')">
        
        @if (isFieldInvalid('name')) {
          <span class="error-msg">{{ t().CONTACT.NAME_ERROR }}</span>
        }
      </div>

      <div class="form-group">
        <label for="email">{{ t().CONTACT.EMAIL_LABEL }}</label>
        <input type="email" id="email" formControlName="email" [placeholder]="t().CONTACT.EMAIL_PLACEHOLDER"
               [class.is-invalid]="isFieldInvalid('email')">
        
        @if (isFieldInvalid('email')) {
          <span class="error-msg">{{ t().CONTACT.EMAIL_ERROR }}</span>
        }
      </div>

      <div class="form-group">
        <label for="message">{{ t().CONTACT.MESSAGE_LABEL }}</label>
        <textarea id="message" formControlName="message" rows="5" [placeholder]="t().CONTACT.MESSAGE_PLACEHOLDER"
                  [class.is-invalid]="isFieldInvalid('message')"></textarea>
        
        @if (isFieldInvalid('message')) {
          <span class="error-msg">{{ t().CONTACT.MESSAGE_ERROR }}</span>
        }
      </div>

      <button type="submit" class="btn-submit" [disabled]="contactForm.invalid || isLoading()">
        @if (isLoading()) {
          {{ t().CONTACT.BTN_LOADING }}
        } @else {
          {{ t().CONTACT.BTN_SEND }}
        }
      </button>

    </form>
  </div>
</section>
